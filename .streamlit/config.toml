# ============================================================================
# STREAMLIT CONFIGURATION - Simplified for Class 4 Learning Hub
# ============================================================================

[theme]
base = "light"
primaryColor = "#667eea"
backgroundColor = "#F9FBFD"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#2E5B88"
font = "sans serif"

[server]
maxUploadSize = 10
enableCORS = true
enableXsrfProtection = true
address = "0.0.0.0"
port = 8501

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[client]
showErrorDetails = true
toolbarMode = "auto"
showSidebarNavigation = true

[runner]
maxCacheSize = 500

